<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Task Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--s1:#1a1a1a;--s2:#202020;--s3:#272727;
  --bd:#2a2a2a;--bd2:#333;
  --acc:#c8f542;--acc2:#8af0b4;
  --tx:#f0f0f0;--mu:#555;--mu2:#3a3a3a;
  --danger:#e05555;--info:#64c8ff;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;font-size:14px}
body{display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100vh;max-width:1100px;margin:0 auto;width:100%;border-left:1px solid var(--bd);border-right:1px solid var(--bd)}
.prog{height:2px;background:var(--s2);flex-shrink:0}
.prog-fill{height:2px;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .4s}
.hdr{display:flex;align-items:center;padding:14px 24px;border-bottom:1px solid var(--bd);gap:12px;flex-shrink:0}
.logo{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--acc);flex:1}
.stats{display:flex;gap:16px}
.stat{text-align:right}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:var(--acc);line-height:1}
.stat-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.body{display:flex;flex:1;overflow:hidden}
.sb{width:210px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 0}
.sb-scroll::-webkit-scrollbar{width:3px}.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd)}
.sb-all{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--mu);border-bottom:1px solid var(--bd);margin-bottom:6px;transition:background .1s}
.sb-all:hover,.sb-all.active{background:var(--s1)}
.sb-all.active{color:var(--acc)}
.sb-all-cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px}
.sbn{user-select:none}
.sbr{display:flex;align-items:center;cursor:pointer;transition:background .1s;position:relative}
.sbr:hover{background:var(--s1)}
.sbr.active{background:var(--s2)}
.sbr.active .sbl,.sbr.active .sb-icon{color:var(--acc)}
.sb-arr{width:14px;height:26px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mu);transition:transform .15s;flex-shrink:0}
.sb-arr.open{transform:rotate(90deg)}
.sb-arr.leaf{opacity:0;pointer-events:none}
.sb-icon{font-size:12px;color:var(--mu);flex-shrink:0;width:14px;text-align:center}
.sbl{flex:1;font-size:12px;color:var(--mu);padding:5px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu2);padding-right:8px;flex-shrink:0}
.sbr.active .sb-nc{color:var(--acc)}
.sb-hov{display:none;align-items:center;gap:1px;padding-right:4px;flex-shrink:0}
.sbr:hover .sb-hov{display:flex}
.sbhb{background:none;border:none;color:var(--mu);cursor:pointer;font-size:12px;padding:2px 3px;border-radius:3px;line-height:1}
.sbhb:hover{color:var(--tx)}
.sbhb.del:hover{color:var(--danger)}
.sb-children{overflow:hidden}
.sb-add-root{display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;font-size:11px;color:var(--mu);border-top:1px solid var(--bd);transition:color .15s;flex-shrink:0}
.sb-add-root:hover{color:var(--acc)}
.pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ph{padding:13px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ph-left{flex:1;min-width:0}
.ph-title{font-size:15px;font-weight:600}
.ph-path{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-top:2px}
.fbtns{display:flex;gap:4px}
.fb{background:none;border:1px solid var(--bd);border-radius:20px;padding:3px 12px;color:var(--mu);font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.fb.active{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600}
.add-form{padding:12px 24px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-inp{flex:1;min-width:160px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:9px 14px;color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;outline:none}
.add-inp:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(200,245,66,.07)}
.add-inp::placeholder{color:var(--mu)}
.cat-select-wrap{position:relative}
.cat-select-btn{display:flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:12px;cursor:pointer;white-space:nowrap;min-width:140px;max-width:200px;font-family:'Syne',sans-serif;transition:border-color .15s}
.cat-select-btn:hover,.cat-select-btn.open{border-color:var(--acc)}
.cat-select-btn i{margin-left:auto;font-size:11px;color:var(--mu)}
.cat-select-btn .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-dropdown{position:absolute;top:calc(100% + 4px);left:0;min-width:220px;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;z-index:100;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5);max-height:280px;overflow-y:auto}
.cat-dropdown::-webkit-scrollbar{width:3px}.cat-dropdown::-webkit-scrollbar-thumb{background:var(--bd)}
.cd-item{display:flex;align-items:center;gap:6px;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--mu);transition:background .1s;white-space:nowrap}
.cd-item:hover{background:var(--s3);color:var(--tx)}
.cd-item.selected{color:var(--acc)}
.time-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mu)}
input[type=date],input[type=time]{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;cursor:pointer}
input[type=date]:focus,input[type=time]:focus{border-color:var(--acc)}
.add-btn{background:var(--acc);color:#000;border:none;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s;margin-left:auto}
.add-btn:hover{opacity:.85}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
.tasks{flex:1;overflow-y:auto}
.tasks::-webkit-scrollbar{width:4px}.tasks::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.empty{padding:48px 24px;text-align:center;color:var(--mu);font-size:13px;line-height:2}
.task-group{animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 24px;border-bottom:1px solid var(--bd);transition:background .1s;position:relative}
.task-row:hover{background:var(--s1)}
.task-indent{flex-shrink:0}
.task-expand{width:14px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--mu);cursor:pointer;flex-shrink:0;margin-top:2px;transition:transform .15s}
.task-expand.open{transform:rotate(90deg)}
.task-expand.hidden{opacity:0;pointer-events:none}
.check{width:17px;height:17px;border-radius:50%;border:2px solid var(--bd2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check:hover{border-color:var(--acc)}
.check.done{background:var(--acc);border-color:var(--acc)}
.check.done::after{content:'✓';font-size:9px;color:#000;font-weight:700}
.task-body{flex:1;min-width:0}
.task-text{font-size:13px;line-height:1.4;word-break:break-word;cursor:pointer}
.task-text:hover{color:var(--acc)}
.task-row.is-done .task-text{color:var(--mu);text-decoration:line-through}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.cat-pill{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:rgba(200,245,66,.08);color:#a0b830}
.date-pill{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace}
.time-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--info);background:rgba(100,200,255,.08);padding:2px 6px;border-radius:4px}
.note-link{font-size:10px;color:var(--mu);cursor:pointer;transition:color .1s}
.note-link:hover{color:var(--tx)}
.subtask-cnt{font-size:10px;color:var(--mu);background:var(--s2);padding:2px 7px;border-radius:4px;cursor:pointer}
.subtask-cnt:hover{color:var(--tx)}
.task-acts{display:none;align-items:center;gap:2px;flex-shrink:0;margin-left:4px}
.task-row:hover .task-acts{display:flex}
.tab{background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;padding:2px 3px;border-radius:4px;line-height:1;transition:color .1s}
.tab:hover{color:var(--tx)}
.tab.danger:hover{color:var(--danger)}
.tab.add-sub{color:var(--acc);opacity:.7;font-size:11px;display:flex;align-items:center;gap:2px;padding:2px 6px;border:1px solid rgba(200,245,66,.2);border-radius:4px}
.tab.add-sub:hover{opacity:1;background:rgba(200,245,66,.05)}
.note-wrap{overflow:hidden;max-height:0;transition:max-height .2s}
.note-wrap.open{max-height:100px}
.note-inner{padding:0 24px 10px}
textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--mu);font-size:11px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;height:46px}
textarea:focus{border-color:var(--bd2);color:var(--tx)}
.sbar{padding:7px 24px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--mu);flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--acc2)}.sdot.err{background:var(--danger)}
.sdot.load{background:var(--acc);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;flex:1}
.sync-btn{background:none;border:1px solid var(--bd);border-radius:6px;padding:3px 10px;color:var(--mu);font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.sync-btn:hover{color:var(--tx)}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .15s}
.mdl{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;padding:24px;width:420px;max-width:95vw;display:flex;flex-direction:column;gap:14px}
.mdl-title{font-size:15px;font-weight:600}
.mf{display:flex;flex-direction:column;gap:5px}
.ml{font-size:11px;color:var(--mu)}
.mdl input,.mdl textarea{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;color:var(--tx);font-family:'Syne',sans-serif;font-size:13px;outline:none;width:100%}
.mdl input:focus,.mdl textarea:focus{border-color:var(--acc)}
.mdl textarea{height:68px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:12px}
.mdl-time{display:flex;align-items:center;gap:8px}
.mdl-time input{flex:1}
.mdl-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.mdbtn{border:none;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.mdbtn.primary{background:var(--acc);color:#000}
.mdbtn.secondary{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.mdbtn:hover{opacity:.85}
.sb-rename{flex:1;background:var(--s3);border:1px solid var(--acc);border-radius:4px;color:var(--tx);font-size:12px;font-family:'Syne',sans-serif;padding:2px 6px;outline:none;margin:2px 2px}
</style>
</head>
<body>
<div class="app">
  <div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="hdr">
    <div class="logo">Task Tracker</div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">всего</div></div>
      <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">готово</div></div>
    </div>
  </div>
  <div class="body">
    <div class="sb">
      <div class="sb-scroll" id="sb-scroll">
        <div class="sb-all active" id="sb-all" onclick="selectCat(null)">
          <i class="ti ti-layout-list" style="font-size:12px"></i>
          <span style="flex:1;font-size:12px;margin-left:6px">Все задачи</span>
          <span class="sb-all-cnt" id="sb-all-cnt"></span>
        </div>
        <div id="sb-tree"></div>
      </div>
      <div class="sb-add-root" onclick="openCatModal(null)">
        <i class="ti ti-plus" style="font-size:12px"></i>
        Новая категория
      </div>
    </div>
    <div class="pane">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title" id="ph-title">Все задачи</div>
          <div class="ph-path" id="ph-path"></div>
        </div>
        <div class="fbtns">
          <button class="fb active" onclick="setDF('all',this)">Все</button>
          <button class="fb" onclick="setDF('active',this)">Активные</button>
          <button class="fb" onclick="setDF('done',this)">Готово</button>
        </div>
      </div>
      <div class="add-form">
        <div class="add-row">
          <input class="add-inp" id="add-inp" type="text" placeholder="Новая задача..." maxlength="300"/>
          <div class="cat-select-wrap" id="cat-wrap">
            <div class="cat-select-btn" id="cat-btn" onclick="toggleCatDrop()">
              <span class="label" id="cat-btn-label">Категория</span>
              <i class="ti ti-chevron-down"></i>
            </div>
            <div class="cat-dropdown" id="cat-drop" style="display:none"></div>
          </div>
          <button class="add-btn" id="add-btn" onclick="addTask()">+ Добавить</button>
        </div>
        <div class="add-row">
          <div class="time-row">
            <i class="ti ti-calendar" style="font-size:13px"></i>
            <input type="date" id="add-date"/>
            <i class="ti ti-clock" style="font-size:13px"></i>
            <input type="time" id="add-tf"/>
            <span>—</span>
            <input type="time" id="add-tt"/>
          </div>
        </div>
      </div>
      <div class="tasks" id="tasks-list"></div>
    </div>
  </div>
  <div class="sbar">
    <div class="sdot" id="sdot"></div>
    <div class="stxt" id="stxt">подключение...</div>
    <button class="sync-btn" onclick="loadAll()">↻ Синхронизировать</button>
  </div>
</div>

<!-- Task Modal -->
<div class="mover" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mdl">
    <div class="mdl-title" id="mdl-title">Задача</div>
    <div class="mf"><div class="ml">Название</div><input id="mdl-name" type="text"/></div>
    <div class="mf"><div class="ml">Дата</div><input id="mdl-date" type="date"/></div>
    <div class="mf"><div class="ml">Время</div>
      <div class="mdl-time"><input id="mdl-tf" type="time"/><span style="color:var(--mu)">—</span><input id="mdl-tt" type="time"/></div>
    </div>
    <div class="mf"><div class="ml">Заметка</div><textarea id="mdl-note" placeholder="Заметка..."></textarea></div>
    <div class="mdl-btns">
      <button class="mdbtn secondary" onclick="closeModal()">Отмена</button>
      <button class="mdbtn primary" id="mdl-ok" onclick="confirmModal()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div class="mover" id="cat-modal" style="display:none" onclick="if(event.target===this)closeCatModal()">
  <div class="mdl">
    <div class="mdl-title" id="cat-mdl-title">Новая категория</div>
    <div class="mf"><div class="ml">Название</div><input id="cat-mdl-name" type="text" placeholder="Название..."/></div>
    <div class="mdl-btns">
      <button class="mdbtn secondary" onclick="closeCatModal()">Отмена</button>
      <button class="mdbtn primary" onclick="confirmCatModal()">Создать</button>
    </div>
  </div>
</div>

<script>
// ── JSONBin config ────────────────────────────────────────────
const BIN_ID  = '6a02f4fbc0954111d80fd33c';
const API_KEY = '$2a$10$8E7NrEQ.ouX3KTeQu7qehejStTfoHl83yPGP3o9lZjCGD7WR4NMs6';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let nodes = [];
let selectedCatId = null;
let doneFilter = 'all';
let expanded = new Set();
let addCatId = null;
let modalCb = null;
let expandedTasks = new Set();
let catDropOpen = false;
let saveTimer = null;

// ── Helpers ──────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const byId = id => nodes.find(n => String(n.id) === String(id));
const catNodes = () => nodes.filter(n => !n.isTask);
const taskNodes = () => nodes.filter(n => n.isTask);
const childCats = pid => catNodes().filter(n => String(n.parentId||'') === String(pid||''));
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = d => { if(!d)return''; const[y,m,day]=String(d).slice(0,10).split('-'); return`${day}.${m}.${y}`; };

function allDescIds(id) {
  const set = new Set([String(id)]);
  const q = [String(id)];
  while(q.length) { const c=q.shift(); nodes.filter(n=>String(n.parentId||'')===c).forEach(n=>{set.add(String(n.id));q.push(String(n.id));}); }
  return set;
}

function getPath(id) {
  const parts=[];let cur=byId(id);
  while(cur){parts.unshift(cur.name);cur=cur.parentId?byId(cur.parentId):null;}
  return parts.join(' › ');
}

// ── Status ───────────────────────────────────────────────────
function setStatus(state,msg){
  document.getElementById('sdot').className='sdot '+state;
  document.getElementById('stxt').textContent=msg;
}

// ── JSONBin API ───────────────────────────────────────────────
async function loadAll(){
  setStatus('load','загрузка...');
  try{
    const r = await fetch(BIN_URL+'/latest', {
      headers: { 'X-Master-Key': API_KEY, 'X-Bin-Private': 'false' }
    });
    const data = await r.json();
    nodes = (data.record.nodes || []).map(n=>({
      ...n,
      isTask: n.isTask===true||n.isTask==='true',
      done:   n.done===true  ||n.done==='true'
    }));
    if(!nodes.length) await initDefaults();
    setStatus('ok','синхронизировано · '+new Date().toLocaleTimeString('ru'));
    refresh();
  }catch(e){setStatus('err','ошибка: '+e.message);}
}

async function saveAll(){
  try{
    await fetch(BIN_URL, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Private': 'false' },
      body: JSON.stringify({ nodes })
    });
    setStatus('ok','сохранено · '+new Date().toLocaleTimeString('ru'));
  }catch(e){setStatus('err','ошибка сохранения');}
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAll, 800);
}

async function initDefaults(){
  const defs=[
    {id:'work',      parentId:null,        name:'Работа',    isTask:false},
    {id:'performia', parentId:'work',      name:'Перформия', isTask:false},
    {id:'target',    parentId:'performia', name:'Таргет',    isTask:false},
    {id:'crm',       parentId:'performia', name:'СРМ',       isTask:false},
    {id:'analytics', parentId:'performia', name:'Аналитика', isTask:false},
    {id:'perf-other',parentId:'performia', name:'Прочее',    isTask:false},
    {id:'mber',      parentId:'work',      name:'MBer',      isTask:false},
    {id:'site',      parentId:'mber',      name:'Сайт',      isTask:false},
    {id:'mber-other',parentId:'mber',      name:'Прочее',    isTask:false},
    {id:'work-other',parentId:'work',      name:'Прочее',    isTask:false},
    {id:'personal',  parentId:null,        name:'Личное',    isTask:false},
  ].map((n,i)=>({...n,done:false,note:'',date:'',timeFrom:'',timeTo:'',priority:'normal',order:i,createdAt:new Date().toISOString()}));
  nodes=defs;
  await saveAll();
}

// ── Sidebar ──────────────────────────────────────────────────
function renderSidebar(){
  const allCnt=taskNodes().length;
  document.getElementById('sb-all').className='sb-all'+(selectedCatId===null?' active':'');
  document.getElementById('sb-all-cnt').textContent=allCnt||'';
  document.getElementById('sb-tree').innerHTML=catNodes().filter(n=>!n.parentId||n.parentId==='').map(n=>renderSbNode(n,0)).join('');
}

function renderSbNode(n,depth){
  const id=String(n.id);
  const ch=childCats(id);
  const isOpen=expanded.has(id);
  const isActive=String(selectedCatId)===id;
  const cnt=taskNodes().filter(t=>allDescIds(id).has(String(t.parentId))).length;
  const pad=10+depth*14;
  return `<div class="sbn">
    <div class="sbr${isActive?' active':''}" onclick="selectCat('${id}')">
      <div style="width:${pad}px;flex-shrink:0"></div>
      <span class="sb-arr${ch.length?(isOpen?' open':''):' leaf'}" onclick="event.stopPropagation();toggleSbExp('${id}')">▶</span>
      <i class="ti ti-folder sb-icon"></i>
      <span class="sbl" id="sbl-${id}">${esc(n.name)}</span>
      <span class="sb-nc">${cnt||''}</span>
      <div class="sb-hov">
        <button class="sbhb" onclick="event.stopPropagation();startRename('${id}')" title="Переименовать"><i class="ti ti-pencil"></i></button>
        <button class="sbhb" onclick="event.stopPropagation();openCatModal('${id}')" title="Подкатегория"><i class="ti ti-folder-plus"></i></button>
        <button class="sbhb del" onclick="event.stopPropagation();deleteCat('${id}')" title="Удалить"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    ${isOpen||isActive?`<div class="sb-children">${ch.map(c=>renderSbNode(c,depth+1)).join('')}</div>`:''}
  </div>`;
}

function toggleSbExp(id){ expanded.has(id)?expanded.delete(id):expanded.add(id); renderSidebar(); }

function selectCat(id){
  selectedCatId=id;
  if(id){expanded.add(String(id));if(!addCatId)setAddCat(id);}
  renderSidebar();renderPane();buildCatDrop();
}

function startRename(id){
  const label=document.getElementById('sbl-'+id);if(!label)return;
  const n=byId(id);if(!n)return;
  const inp=document.createElement('input');
  inp.className='sb-rename';inp.value=n.name;
  label.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{n.name=inp.value.trim()||n.name;renderSidebar();buildCatDrop();scheduleSave();};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=n.name;inp.blur();}});
}

// ── Category dropdown ─────────────────────────────────────────
function buildCatDrop(){
  const drop=document.getElementById('cat-drop');
  const items=[];
  function walk(pid,depth){
    catNodes().filter(n=>String(n.parentId||'')===String(pid||'')).forEach(n=>{
      items.push({id:n.id,name:n.name,depth});walk(n.id,depth+1);
    });
  }
  walk(null,0);
  drop.innerHTML=items.map(it=>`
    <div class="cd-item${String(addCatId)===String(it.id)?' selected':''}"
      style="padding-left:${14+it.depth*14}px"
      onclick="setAddCat('${it.id}');toggleCatDrop()">
      <i class="ti ti-folder" style="font-size:11px"></i>${esc(it.name)}
    </div>`).join('');
}

function toggleCatDrop(){
  catDropOpen=!catDropOpen;
  const drop=document.getElementById('cat-drop');
  const btn=document.getElementById('cat-btn');
  drop.style.display=catDropOpen?'block':'none';
  btn.classList.toggle('open',catDropOpen);
  if(catDropOpen)buildCatDrop();
}

function setAddCat(id){
  addCatId=id;
  const n=byId(id);
  document.getElementById('cat-btn-label').textContent=n?n.name:'Категория';
}

document.addEventListener('click',e=>{
  if(catDropOpen&&!document.getElementById('cat-wrap').contains(e.target)){
    catDropOpen=false;
    document.getElementById('cat-drop').style.display='none';
    document.getElementById('cat-btn').classList.remove('open');
  }
});

// ── Pane ─────────────────────────────────────────────────────
function renderPane(){
  const n=selectedCatId?byId(selectedCatId):null;
  document.getElementById('ph-title').textContent=n?n.name:'Все задачи';
  document.getElementById('ph-path').textContent=n?getPath(selectedCatId):'';
  renderTasks();
}

function renderTasks(){
  let topTasks;
  if(!selectedCatId){
    topTasks=taskNodes().filter(t=>{ const p=byId(t.parentId); return !p||!p.isTask; });
  } else {
    const ids=allDescIds(selectedCatId);
    topTasks=taskNodes().filter(t=>{ const p=byId(t.parentId); return ids.has(String(t.parentId))&&(!p||!p.isTask); });
  }
  if(doneFilter==='active') topTasks=topTasks.filter(t=>!t.done);
  if(doneFilter==='done')   topTasks=topTasks.filter(t=>t.done);
  const el=document.getElementById('tasks-list');
  if(!topTasks.length){el.innerHTML='<div class="empty">Задач нет — добавьте первую!</div>';return;}
  el.innerHTML=topTasks.map(t=>renderTaskGroup(t,0)).join('');
}

function renderTaskGroup(t,depth){
  return `<div class="task-group">${renderTaskRow(t,depth)}${expandedTasks.has(String(t.id))?renderSubtasks(t.id,depth+1):''}</div>`;
}

function renderTaskRow(t,depth){
  const subtasks=taskNodes().filter(s=>String(s.parentId)===String(t.id));
  const cat=byId(t.parentId);
  const catName=cat&&!cat.isTask?cat.name:'';
  const timeBadge=(t.timeFrom||t.timeTo)?`<span class="time-pill"><i class="ti ti-clock" style="font-size:9px"></i>${t.timeFrom||''}${t.timeTo?' — '+t.timeTo:''}</span>`:'';
  const dateBadge=t.date?`<span class="date-pill">${fmtDate(t.date)}</span>`:'';
  const catBadge=catName&&depth===0?`<span class="cat-pill">${esc(catName)}</span>`:'';
  const subCnt=subtasks.length?`<span class="subtask-cnt" onclick="toggleSubs('${t.id}')">▸ ${subtasks.length} подзадач</span>`:'';
  const isExp=expandedTasks.has(String(t.id));
  const indent=depth*28;
  return `<div class="task-row${t.done?' is-done':''}" id="tr-${t.id}">
    <div class="task-indent" style="width:${indent}px;flex-shrink:0"></div>
    <span class="task-expand${subtasks.length?(isExp?' open':''):' hidden'}" onclick="toggleSubs('${t.id}')">▶</span>
    <div class="check${t.done?' done':''}" onclick="toggleDone('${t.id}')"></div>
    <div class="task-body">
      <div class="task-text" onclick="openEditModal('${t.id}')">${esc(t.name)}</div>
      <div class="task-meta">
        ${catBadge}${dateBadge}${timeBadge}${subCnt}
        <span class="note-link" onclick="toggleNote('${t.id}')">${t.note?'📝':'+ заметка'}</span>
      </div>
    </div>
    <div class="task-acts">
      <button class="tab add-sub" onclick="openAddSubtask('${t.id}')"><i class="ti ti-plus" style="font-size:11px"></i> подзадача</button>
      <button class="tab" onclick="openEditModal('${t.id}')" title="Редактировать"><i class="ti ti-pencil"></i></button>
      <button class="tab danger" onclick="deleteTask('${t.id}')" title="Удалить"><i class="ti ti-trash"></i></button>
    </div>
  </div>
  <div class="note-wrap" id="nw-${t.id}">
    <div class="note-inner" style="padding-left:${indent+70}px">
      <textarea placeholder="Заметка..." onchange="saveNote('${t.id}',this.value)" onblur="saveNote('${t.id}',this.value)">${esc(t.note||'')}</textarea>
    </div>
  </div>`;
}

function renderSubtasks(parentId,depth){
  const subs=taskNodes().filter(s=>String(s.parentId)===String(parentId));
  if(!subs.length)return'';
  return subs.map(s=>`<div class="task-group">${renderTaskRow(s,depth)}${expandedTasks.has(String(s.id))?renderSubtasks(s.id,depth+1):''}</div>`).join('');
}

function toggleSubs(id){ expandedTasks.has(id)?expandedTasks.delete(id):expandedTasks.add(id); renderTasks(); }
function setDF(f,btn){ doneFilter=f; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderTasks(); }

// ── Add task ─────────────────────────────────────────────────
async function addTask(){
  const inp=document.getElementById('add-inp');
  const name=inp.value.trim();if(!name)return;
  if(!addCatId){alert('Выберите категорию');return;}
  const btn=document.getElementById('add-btn');btn.disabled=true;
  const node={id:String(Date.now()),parentId:addCatId,name,isTask:true,done:false,note:'',
    date:document.getElementById('add-date').value||todayStr(),
    timeFrom:document.getElementById('add-tf').value||'',
    timeTo:document.getElementById('add-tt').value||'',
    priority:'normal',order:nodes.length,createdAt:new Date().toISOString()};
  nodes.push(node);
  inp.value='';
  document.getElementById('add-tf').value='';
  document.getElementById('add-tt').value='';
  refresh();setStatus('load','сохранение...');
  await saveAll();
  btn.disabled=false;
}

// ── Subtask ───────────────────────────────────────────────────
function openAddSubtask(parentTaskId){
  const parent=byId(parentTaskId);
  openModal({
    title:'Подзадача'+(parent?' → '+parent.name:''),
    node:{name:'',date:todayStr(),timeFrom:'',timeTo:'',note:''},
    okLabel:'Создать',
    onOk:async(data)=>{
      const node={id:String(Date.now()),parentId:parentTaskId,name:data.name,isTask:true,done:false,
        note:data.note||'',date:data.date||todayStr(),timeFrom:data.timeFrom||'',timeTo:data.timeTo||'',
        priority:'normal',order:nodes.length,createdAt:new Date().toISOString()};
      nodes.push(node);
      expandedTasks.add(String(parentTaskId));
      refresh();setStatus('load','сохранение...');
      await saveAll();
    }
  });
}

// ── Toggle done ───────────────────────────────────────────────
async function toggleDone(id){
  const n=byId(id);if(!n)return;
  n.done=!n.done;refresh();setStatus('load','сохранение...');
  await saveAll();
}

// ── Note ─────────────────────────────────────────────────────
function toggleNote(id){
  const el=document.getElementById('nw-'+id);
  if(el){el.classList.toggle('open');if(el.classList.contains('open'))el.querySelector('textarea').focus();}
}
function saveNote(id,val){
  const n=byId(id);if(!n)return;
  n.note=val;scheduleSave();
}

// ── Edit modal ────────────────────────────────────────────────
function openEditModal(id){
  const n=byId(id);if(!n)return;
  openModal({title:'Редактировать',node:n,okLabel:'Сохранить',
    onOk:async(data)=>{
      n.name=data.name;n.date=data.date;n.timeFrom=data.timeFrom;n.timeTo=data.timeTo;n.note=data.note;
      refresh();setStatus('load','сохранение...');await saveAll();
    }
  });
}

function openModal({title,node,okLabel,onOk}){
  document.getElementById('mdl-title').textContent=title;
  document.getElementById('mdl-ok').textContent=okLabel;
  document.getElementById('mdl-name').value=node.name||'';
  document.getElementById('mdl-date').value=node.date||todayStr();
  document.getElementById('mdl-tf').value=node.timeFrom||'';
  document.getElementById('mdl-tt').value=node.timeTo||'';
  document.getElementById('mdl-note').value=node.note||'';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('mdl-name').focus(),40);
  modalCb=onOk;
}
function closeModal(){document.getElementById('modal').style.display='none';modalCb=null;}
function confirmModal(){
  const name=document.getElementById('mdl-name').value.trim();
  if(!name){document.getElementById('mdl-name').focus();return;}
  const data={name,date:document.getElementById('mdl-date').value,
    timeFrom:document.getElementById('mdl-tf').value,
    timeTo:document.getElementById('mdl-tt').value,
    note:document.getElementById('mdl-note').value};
  const cb=modalCb;closeModal();if(cb)cb(data);
}
document.getElementById('mdl-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal();});

// ── Delete task ───────────────────────────────────────────────
async function deleteTask(id){
  const n=byId(id);if(!n)return;
  const descIds=allDescIds(id);
  const childCount=descIds.size-1;
  if(!confirm(`Удалить "${n.name}"?${childCount?`\n\nВместе с ней будет удалено ${childCount} подзадач.`:''}`))return;
  nodes=nodes.filter(n=>!descIds.has(String(n.id)));
  refresh();setStatus('load','сохранение...');await saveAll();
}

// ── Category modal ────────────────────────────────────────────
let catModalParentId=null;
function openCatModal(parentId){
  catModalParentId=parentId;
  const parent=parentId?byId(parentId):null;
  document.getElementById('cat-mdl-title').textContent=parent?`Подкатегория в "${parent.name}"`:'Новая категория';
  document.getElementById('cat-mdl-name').value='';
  document.getElementById('cat-modal').style.display='flex';
  setTimeout(()=>document.getElementById('cat-mdl-name').focus(),40);
}
function closeCatModal(){document.getElementById('cat-modal').style.display='none';}
async function confirmCatModal(){
  const name=document.getElementById('cat-mdl-name').value.trim();
  if(!name){document.getElementById('cat-mdl-name').focus();return;}
  closeCatModal();
  const node={id:String(Date.now()),parentId:catModalParentId||null,name,isTask:false,done:false,note:'',
    date:'',timeFrom:'',timeTo:'',priority:'normal',order:nodes.length,createdAt:new Date().toISOString()};
  nodes.push(node);
  if(catModalParentId)expanded.add(String(catModalParentId));
  refresh();buildCatDrop();setStatus('load','сохранение...');await saveAll();
}
document.getElementById('cat-mdl-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmCatModal();if(e.key==='Escape')closeCatModal();});

// ── Delete category ───────────────────────────────────────────
async function deleteCat(id){
  const n=byId(id);if(!n)return;
  const descIds=allDescIds(id);
  if(!confirm(`Удалить категорию "${n.name}" и всё внутри?`))return;
  nodes=nodes.filter(n=>!descIds.has(String(n.id)));
  if(String(selectedCatId)===String(id))selectedCatId=null;
  refresh();buildCatDrop();setStatus('load','сохранение...');await saveAll();
}

// ── Refresh ───────────────────────────────────────────────────
function refresh(){
  const all=taskNodes(),done=all.filter(t=>t.done).length;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('prog').style.width=(all.length?Math.round(done/all.length*100):0)+'%';
  renderSidebar();renderPane();
}

// ── Init ─────────────────────────────────────────────────────
document.getElementById('add-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('add-date').value=todayStr();
loadAll();
</script>
</body>
</html>
